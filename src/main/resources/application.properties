spring.application.name=kyc-service

# ── Banco de dados ────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT — mesma chave secreta (Base64) do authentication-service ──────────────
spring.security.oauth2.resourceserver.jwt.secret-key=${JWT_SECRET_BASE64}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# ── MinIO ─────────────────────────────────────────────────────────────────────
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket=${MINIO_BUCKET:kyc-documents}

# ── Upload ────────────────────────────────────────────────────────────────────
# 7 MB por arquivo
spring.servlet.multipart.max-file-size=7MB
spring.servlet.multipart.max-request-size=7MB

# ── OCR — caminho para os dados de treinamento do Tesseract ───────────────────
# Baixe em: https://github.com/tesseract-ocr/tessdata


kyc.ocr.tessdata-path=${TESSDATA_PATH:/usr/share/tesseract-ocr/5/tessdata}
kyc.ocr.language=${OCR_LANGUAGE:por}